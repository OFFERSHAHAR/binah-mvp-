<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Heebo', system-ui, sans-serif; -webkit-font-smoothing: antialiased; color: #2E2E48; }
  @keyframes floatA { 0%,100% { transform: translate(0,0); } 50% { transform: translate(30px,-34px); } }
  @keyframes floatB { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-32px,26px); } }
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(130,135,170,0.24); border-radius: 99px; border: 3px solid transparent; background-clip: padding-box; }
</style>
</helmet>
<div dir="rtl" style="position:relative; min-height:100vh; background:linear-gradient(165deg,#F4F3FC,#EFF0FA 45%,#ECF8F4); overflow:hidden;">
  <div style="position:absolute; width:620px; height:620px; right:-180px; top:-220px; border-radius:50%; background:radial-gradient(circle at 40% 40%,rgba(214,199,255,0.5),transparent 70%); filter:blur(46px); animation:floatA 24s ease-in-out infinite; pointer-events:none;"></div>
  <div style="position:absolute; width:540px; height:540px; left:-170px; bottom:-200px; border-radius:50%; background:radial-gradient(circle at 50% 50%,rgba(182,239,212,0.46),transparent 70%); filter:blur(48px); animation:floatB 28s ease-in-out infinite; pointer-events:none;"></div>

  <div style="position:relative; z-index:1; max-width:1080px; margin:0 auto; padding:40px 36px 70px;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:30px;">
      <div style="display:flex; align-items:center; gap:13px;">
        <div style="width:46px; height:46px; border-radius:15px; background:linear-gradient(135deg,#9FB4F5,#C3A8EE); display:flex; align-items:center; justify-content:center; box-shadow:0 10px 24px rgba(159,180,245,0.5);"><svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"><path d="M12 3v18M3 12h18"/></svg></div>
        <div><div style="font-size:21px; font-weight:800; color:#2E2E48; line-height:1;">בִּינָה</div><div style="font-size:11px; font-weight:600; color:#A6AABE; letter-spacing:.18em; margin-top:3px;">AI ACADEMY · מפת המערכת</div></div>
      </div>
      <a href="House.dc.html" style="text-decoration:none; display:inline-flex; align-items:center; gap:8px; height:44px; padding:0 18px; border-radius:14px; background:linear-gradient(135deg,#9FB4F5,#C3A8EE); color:#fff; font-size:14px; font-weight:700; box-shadow:0 8px 20px rgba(150,140,220,0.34);" style-hover="transform:translateY(-3px) scale(1.03);"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg> כניסה לבית</a>
    </div>

    <div style="text-align:center; margin-bottom:34px;">
      <div style="font-size:34px; font-weight:900; color:#2E2E48; letter-spacing:-.02em;">כל המסכים במקום אחד</div>
      <div style="font-size:15px; color:#7A7A92; margin-top:8px;">{{ total }} מסכים · מאורגנים לפי תחום אחריות</div>
    </div>

    <sc-for list="{{ groups }}" as="g" hint-placeholder-count="4">
      <div style="margin-bottom:30px;">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:14px;">
          <div style="width:32px; height:32px; border-radius:10px; background:{{ g.iconGrad }}; display:flex; align-items:center; justify-content:center;"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="{{ g.icon }}"/></svg></div>
          <div style="font-size:18px; font-weight:800; color:#2E2E48;">{{ g.name }}</div>
          <div style="flex:1; height:1px; background:rgba(130,135,170,0.18);"></div>
          <span style="font-size:12px; font-weight:700; color:#A6AABE;">{{ g.count }}</span>
        </div>
        <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:13px;">
          <sc-for list="{{ g.items }}" as="it" hint-placeholder-count="4">
            <a href="{{ it.href }}" style="text-decoration:none; position:relative; overflow:hidden; border-radius:18px; background:rgba(255,255,255,0.7); border:1px solid rgba(255,255,255,0.85); backdrop-filter:blur(30px); box-shadow:0 10px 24px rgba(80,70,140,0.06); padding:16px; display:flex; flex-direction:column; gap:10px; transition:transform .28s cubic-bezier(.34,1.35,.5,1), box-shadow .28s ease;" style-hover="transform:translateY(-5px); box-shadow:0 20px 40px rgba(80,70,140,0.16);">
              <div style="display:flex; align-items:center; justify-content:space-between;">
                <div style="width:38px; height:38px; border-radius:12px; background:{{ it.grad }}; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 14px {{ it.shadow }};"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="{{ it.icon }}"/></svg></div>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C3C6DA" stroke-width="2.2"><path d="M9 6l6 6-6 6"/></svg>
              </div>
              <div><div style="font-size:14px; font-weight:800; color:#2E2E48;">{{ it.title }}</div><div style="font-size:11px; color:#A6AABE; margin-top:2px; line-height:1.35;">{{ it.sub }}</div></div>
            </a>
          </sc-for>
        </div>
      </div>
    </sc-for>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  renderVals() {
    const P = 'linear-gradient(135deg,#9FB4F5,#C3A8EE)', M = 'linear-gradient(135deg,#7FD3C0,#9AD9F0)', R = 'linear-gradient(135deg,#FFB37A,#FF7A9C)', V = 'linear-gradient(135deg,#C3A8EE,#E0A8E8)', Y = 'linear-gradient(135deg,#FFD08A,#FFB0A0)';
    const sh = { P: 'rgba(159,180,245,0.4)', M: 'rgba(127,211,192,0.4)', R: 'rgba(255,140,150,0.4)', V: 'rgba(195,168,238,0.4)', Y: 'rgba(255,180,150,0.4)' };
    const it = (title, sub, href, icon, grad, shadow) => ({ title, sub, href, icon, grad, shadow });

    const groups = [
      { name: 'כניסה ותלמיד', icon: 'M9 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM2 20a7 7 0 0 1 14 0', iconGrad: P, items: [
        it('כניסה מאובטחת', '3 וריאציות · 2FA · SSO', 'Login.dc.html', 'M4 4h16v16H4zM4 9h16', P, sh.P),
        it('הקורסים שלי', 'דשבורד תלמיד', 'Dashboard.dc.html', 'M3 11l9-8 9 8M5 10v10h14V10', M, sh.M),
        it('הפרופיל שלי', 'עבודות גמר · IDE · בוגרים', 'StudentProfile.dc.html', 'M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM4 21a8 8 0 0 1 16 0', V, sh.V),
        it('תוסף קשב', 'תדר ריכוז', 'FocusSound.dc.html', 'M3 12h3l3-8 4 16 3-8h5', Y, sh.Y),
      ] },
      { name: 'מרצה ויצירה', icon: 'M12 2l2.4 4.9 5.4.8-3.9 3.8.9 5.4-4.8-2.5-4.8 2.5.9-5.4L3.2 7.7l5.4-.8z', iconGrad: V, items: [
        it('קונסולת מרצה', 'תלמידים · שבי', 'Instructor.dc.html', 'M9 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM2 20a7 7 0 0 1 14 0M17 11a3 3 0 0 0 0-6M22 20a7 7 0 0 0-5-6.7', P, sh.P),
        it('תכנית הלימודים', 'מבנה קורסים מחייב', 'Curriculum.dc.html', 'M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z', M, sh.M),
        it('אישור שיעורים', 'ביקורת איכות · שבי', 'Approvals.dc.html', 'M9 12l2 2 4-4M12 3l7 4v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V7z', M, sh.M),
        it('בניית שיעור', 'מאגר + storyboard', 'LessonBuilder.dc.html', 'M4 4h16v16H4zM8 9h8M8 13h5', P, sh.P),
        it('סטודיו AI', 'תסריט → וידאו', 'Studio.dc.html', 'M12 2l2.4 4.9 5.4.8-3.9 3.8.9 5.4-4.8-2.5-4.8 2.5.9-5.4L3.2 7.7l5.4-.8z', M, sh.M),
        it('חדר שידור', 'בקרת שידור חי', 'Record.dc.html', 'M2 4h20v16H2zM11 13l4 2.5-4 2.5z', R, sh.R),
        it('סוכן גרפיקה', 'Parallax · Hype-type', 'GraphicsAgent.dc.html', 'M12 2l2.2 5.6L20 9l-5.8 1.4L12 16l-2.2-5.6L4 9z', V, sh.V),
        it('ליווי בשיעור חי', 'איתותי קושי · תגבור', 'LiveAssist.dc.html', 'M22 12h-4l-3 9L9 3l-3 9H2', R, sh.R),
      ] },
      { name: 'צוותים ושיתוף', icon: 'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0 8 4 4 0 0 0 0-8z', iconGrad: M, items: [
        it('צוותים', 'מרחב עבודה שיתופי', 'Teams.dc.html', 'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0 8 4 4 0 0 0 0-8z', M, sh.M),
        it('יומן שיעורים', 'זום חי · לינקים מוגנים', 'Calendar.dc.html', 'M3 4h18v18H3zM3 10h18M8 2v4M16 2v4', P, sh.P),
        it('קהילת בוגרים', 'מנטורינג · משרות', 'Alumni.dc.html', 'M22 10 12 5 2 10l10 5 10-5zM6 12v5c0 1 2.7 2 6 2s6-1 6-2v-5', V, sh.V),
      ] },
      { name: 'ניהול ותשתית', icon: 'M3 21h18M5 21V7l8-4 8 4v14', iconGrad: P, items: [
        it('ניהול המכללה', 'מדריכים · כספים · חוזים', 'Admin.dc.html', 'M3 21h18M5 21V7l8-4 8 4v14M9 9v.01M9 13v.01', P, sh.P),
        it('מדיה ושיווק', 'סוכן תוכן · 5 גרסאות', 'Media.dc.html', 'M3 3h18v18H3zM3 9h18', V, sh.V),
        it('אבטחה והרשאות', 'אותנטיקציה · תפקידים', 'Security.dc.html', 'M12 2 4 5v6c0 5 3.5 8 8 11 4.5-3 8-6 8-11V5z', M, sh.M),
        it('בריאות המערכת', 'ניטור · תיקון עצמי', 'SystemHealth.dc.html', 'M22 12h-4l-3 9L9 3l-3 9H2', R, sh.R),
      ] },
    ];
    const groupsOut = groups.map(g => ({ ...g, count: g.items.length + ' מסכים' }));
    const total = groups.reduce((a, g) => a + g.items.length, 0);
    return { groups: groupsOut, total };
  }
}
</script>
</body>
</html>
